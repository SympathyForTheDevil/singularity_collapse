<!DOCTYPE html><html><head><meta charset="utf-8"><style>
  html,body{margin:0;padding:0;background:transparent}
  canvas{display:block}
</style></head><body>
<canvas id="c" width="1024" height="1024"></canvas>
<script>
// App-icon master art: a big, bold black hole — vivid purple event horizon +
// orange accretion disk, filling the icon (no worldline). Rendered headless to
// icon.png; the same image is used for the Android adaptive *foreground* (the
// generator adds a 16% safe-zone inset) and the full iOS/legacy icon.
const ctx = document.getElementById('c').getContext('2d');
const S = 1024, cx = 512, cy = 512;
const coreR = 262;                 // big hole, fills the icon

// ── Deep-space background (opaque; faint purple-tinted core) ─────────────────
const bg = ctx.createRadialGradient(cx, cy, 0, cx, cy, 760);
bg.addColorStop(0, '#0c0820');
bg.addColorStop(0.5, '#070912');
bg.addColorStop(1, '#03040a');
ctx.fillStyle = bg; ctx.fillRect(0, 0, S, S);

// deterministic starfield (sparse — the glow is the hero)
let seed = 0x5EED;
function rnd(){ seed = (seed * 1103515245 + 12345) & 0x7fffffff; return seed / 0x7fffffff; }
for (let i = 0; i < 55; i++) {
  const x = rnd() * S, y = rnd() * S, r = rnd() * 1.6 + 0.4, a = rnd() * 0.45 + 0.12;
  ctx.fillStyle = 'rgba(190,215,245,' + a + ')';
  ctx.beginPath(); ctx.arc(x, y, r, 0, 7); ctx.fill();
}

// ── Purple event-horizon glow halo (the dominant feature) ───────────────────
const halo = ctx.createRadialGradient(cx, cy, coreR * 0.78, cx, cy, coreR * 1.92);
halo.addColorStop(0.0,  'rgba(187,85,255,0.0)');
halo.addColorStop(0.28, 'rgba(190,90,255,0.55)');
halo.addColorStop(0.55, 'rgba(150,60,230,0.28)');
halo.addColorStop(1.0,  'rgba(120,40,200,0.0)');
ctx.fillStyle = halo;
ctx.beginPath(); ctx.arc(cx, cy, coreR * 1.92, 0, 7); ctx.fill();

// ── Accretion disk (orange, vertically squashed) ─────────────────────────────
ctx.save();
ctx.translate(cx, cy); ctx.scale(1, 0.30);
ctx.shadowColor = 'rgba(255,140,40,0.7)'; ctx.shadowBlur = 38;
ctx.lineWidth = 28; ctx.strokeStyle = 'rgba(255,122,30,0.98)';
ctx.beginPath(); ctx.arc(0, 0, coreR * 1.32, 0, 7); ctx.stroke();
ctx.shadowBlur = 0;
ctx.lineWidth = 15; ctx.strokeStyle = 'rgba(255,176,60,0.5)';
ctx.beginPath(); ctx.arc(0, 0, coreR * 1.58, 0, 7); ctx.stroke();
ctx.restore();

// ── Black hole core ──────────────────────────────────────────────────────────
ctx.fillStyle = '#000';
ctx.beginPath(); ctx.arc(cx, cy, coreR, 0, 7); ctx.fill();

// ── Event-horizon ring: thick, bright purple with a strong bloom ─────────────
ctx.shadowColor = 'rgba(200,110,255,0.95)'; ctx.shadowBlur = 60;
ctx.lineWidth = 24; ctx.strokeStyle = '#c060ff';
ctx.beginPath(); ctx.arc(cx, cy, coreR, 0, 7); ctx.stroke();
ctx.shadowBlur = 28;
ctx.lineWidth = 11; ctx.strokeStyle = '#e6c0ff';
ctx.beginPath(); ctx.arc(cx, cy, coreR, 0, 7); ctx.stroke();
ctx.shadowBlur = 0;
</script></body></html>
