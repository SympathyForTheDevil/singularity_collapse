name: Build & Release

# Runs on every push to main.
# Produces:
#   • Collapse.apk  — install directly on any Android device
#   • Collapse.ipa  — sideload on iPhone via AltStore or Sideloadly (unsigned)
# Both are attached to the "Latest Build" GitHub Release and updated each run.
#
# Signing (optional): set these four secrets for a signed APK.
# Without them the Android build falls back to debug signing (still installable).
#   KEYSTORE_BASE64       — base64-encoded .jks keystore
#   KEY_STORE_PASSWORD    — keystore password
#   KEY_PASSWORD          — key password
#   KEY_ALIAS             — key alias

on:
  push:
    branches: [main]

permissions:
  contents: write   # needed to create / update releases

# ─── Android ──────────────────────────────────────────────────────────────────
jobs:
  android:
    name: Android APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-java@v4.7.0
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      # If the keystore secret is present, decode it and export signing env vars
      # so Gradle picks them up. Without them, build.gradle.kts falls back to
      # debug signing automatically.
      - name: Configure signing (if secrets are set)
        env:
          KEYSTORE_BASE64:    ${{ secrets.KEYSTORE_BASE64 }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD:       ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS:          ${{ secrets.KEY_ALIAS }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > android/collapse-release.jks
            echo "KEY_STORE_PATH=${{ github.workspace }}/android/collapse-release.jks" >> "$GITHUB_ENV"
            echo "KEY_STORE_PASSWORD=$KEY_STORE_PASSWORD" >> "$GITHUB_ENV"
            echo "KEY_PASSWORD=$KEY_PASSWORD"             >> "$GITHUB_ENV"
            echo "KEY_ALIAS=$KEY_ALIAS"                   >> "$GITHUB_ENV"
            echo "Signed build configured."
          else
            echo "No keystore secret — using debug signing fallback."
          fi

      - name: Build release APK
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx1536m -Dorg.gradle.daemon=false"
        run: flutter build apk --release

      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk Collapse.apk

      - uses: actions/upload-artifact@v4.6.2
        with:
          name: android-apk
          path: Collapse.apk
          retention-days: 7

# ─── iOS ──────────────────────────────────────────────────────────────────────
  ios:
    name: iOS IPA (unsigned)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Package IPA
        run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/Runner.app
          zip -r Collapse.ipa Payload
          mv Collapse.ipa ../../../Collapse.ipa

      - uses: actions/upload-artifact@v4.6.2
        with:
          name: ios-ipa
          path: Collapse.ipa
          retention-days: 7

# ─── GitHub Release ───────────────────────────────────────────────────────────
  release:
    name: Update Latest Release
    needs: [android, ios]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4.3.0
        with:
          name: android-apk
          path: dist/

      - uses: actions/download-artifact@v4.3.0
        with:
          name: ios-ipa
          path: dist/

      - name: Get short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Create / update "Latest Build" release
        uses: ncipollo/release-action@v1
        with:
          tag: latest-build
          name: "Latest Build"
          allowUpdates: true
          removeArtifacts: true
          artifacts: "dist/Collapse.apk,dist/Collapse.ipa"
          prerelease: true
          body: |
            ## Singularity: Collapse — Latest Build

            Automatically built from the latest commit on `main`.

            **Commit:** `${{ steps.sha.outputs.short }}` — ${{ github.event.head_commit.message }}

            ---

            ### 📱 Android
            Download **Collapse.apk** and open it on your Android device.
            *(Enable "Install from unknown sources" in Settings → Security if prompted)*

            ### 🍎 iPhone (sideload — no App Store needed)
            Download **Collapse.ipa** and install it using one of:
            - **[AltStore](https://altstore.io)** — free, renews weekly automatically
            - **[Sideloadly](https://sideloadly.io)** — free, drag-and-drop install
            - **[TrollStore](https://github.com/opa334/TrollStore)** — permanent install (iOS 14–16.6.1 only)

            > Unsigned sideloaded apps expire after **7 days** with a free Apple ID.
            > Re-run AltStore/Sideloadly to refresh. TrollStore installs never expire.
