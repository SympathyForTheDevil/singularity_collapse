# Codemagic CI/CD — iOS build → sign → TestFlight, no Mac required.
# Full setup walkthrough: see IOS_TESTFLIGHT.md
#
# Prerequisites you must set before the first build (see IOS_TESTFLIGHT.md):
#   1. integrations.app_store_connect → the NAME you give the App Store Connect
#      API key when you add it in Codemagic (Team settings → Integrations).
#   2. APP_STORE_APPLE_ID → the numeric "Apple ID" on your app's App Information
#      page in App Store Connect.
#   3. CERTIFICATE_PRIVATE_KEY → a secure Codemagic env var (group
#      `appstore_credentials`) holding an RSA private key. A brand-new app has no
#      signing cert and --create cannot mint the first one without a key to base it
#      on; we generate one (openssl genrsa) and Codemagic mints + reuses the cert
#      from it. Status: LIVE — first signed build installed via TestFlight 2026-06-12.

workflows:
  ios-testflight:
    name: iOS · TestFlight
    instance_type: mac_mini_m2          # Codemagic's macOS build machine
    max_build_duration: 60
    integrations:
      app_store_connect: CodemagicAppStore   # ← match the key name you set in Codemagic
    environment:
      groups:
        - appstore_credentials                 # CERTIFICATE_PRIVATE_KEY (secure var, set in Codemagic UI)
      vars:
        APP_STORE_APPLE_ID: 6779779848         # ← your app's numeric Apple ID
        BUNDLE_ID: com.sympathyforthedevil.singularityCollapse
      flutter: stable
      xcode: latest
      cocoapods: default
    # No auto-trigger by default — start builds manually from the Codemagic UI to
    # conserve free build minutes. To auto-build on push to main, uncomment:
    # triggering:
    #   events: [push]
    #   branch_patterns:
    #     - pattern: main
    #       include: true
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Install CocoaPods dependencies
        script: find . -name "Podfile" -execdir pod install \;
      # Explicit automatic signing. A brand-new app has no certificate/profile yet,
      # and --create cannot mint the FIRST distribution certificate without a private
      # key to base it on. We supply our own persistent key (CERTIFICATE_PRIVATE_KEY,
      # a secure Codemagic env var): --create mints the cert FROM that key on the
      # first run and reuses the same cert on every later run (no certificate churn).
      - name: Set up the signing keychain
        script: keychain initialize
      - name: Fetch (and create on first run) the App Store signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@env:CERTIFICATE_PRIVATE_KEY \
            --create
      - name: Add the signing certificate to the keychain
        script: keychain add-certificates
      - name: Apply the signing profiles to the Xcode project
        script: xcode-project use-profiles
      - name: Build the signed IPA (auto-incrementing the build number)
        script: |
          BUILD_NUMBER=$(($(app-store-connect get-latest-testflight-build-number "$APP_STORE_APPLE_ID") + 1))
          flutter build ipa --release \
            --build-number="$BUILD_NUMBER" \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # beta_groups:            # optional: also push to a named external tester group
        #   - Internal Testers
